services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clickvector
      MYSQL_USER: clickvector
      MYSQL_PASSWORD: clickvector
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    build:
      context: .
      dockerfile: clickhouse/Dockerfile
    depends_on:
      minio:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      CLICKHOUSE_DB: document_pipeline
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      MINIO_PREFIX: ""
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: clickvector
      MYSQL_PASSWORD: clickvector
      MYSQL_DATABASE: clickvector
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "200"
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSION: "1536"
      MAX_DOCUMENTS_PER_RUN: "10"
      MAX_ATTEMPTS: "3"
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: clickvector
      MYSQL_PASSWORD: clickvector
      MYSQL_DATABASE: clickvector
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: document_pipeline
      FRONTEND_ORIGIN: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSION: "1536"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  mysql-data:
  minio-data:
  clickhouse-data:
